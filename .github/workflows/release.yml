name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: windows/go.sum

      - name: Install rsrc (icon embedder)
        run: go install github.com/akavel/rsrc@latest

      - name: Stamp VERSION file with tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          if (-not $tag) { $tag = "${{ github.event.inputs.tag }}".TrimStart("v") }
          if (-not $tag) { $tag = "dev" }
          Set-Content -Path windows\VERSION -Value $tag -Encoding utf8
          Set-Content -Path VERSION         -Value $tag -Encoding utf8
          Get-Content VERSION

      - name: Embed icon and build vpn-proxy.exe
        working-directory: windows
        run: |
          $env:Path += ';' + (go env GOPATH) + '\bin'
          rsrc -ico icon.ico -manifest "" -o rsrc_windows.syso
          go build -o vpn-proxy.exe .

      - name: Bundle OpenVPN community client + Wintun (no driver install needed)
        shell: pwsh
        run: |
          $url = "https://swupdate.openvpn.net/community/releases/OpenVPN-2.6.12-I001-amd64.msi"
          Invoke-WebRequest $url -OutFile ovpn.msi -UseBasicParsing
          choco install lessmsi -y --no-progress
          $env:Path += ";C:\ProgramData\chocolatey\lib\lessmsi\tools\lessmsi"
          # Use absolute paths — lessmsi on Windows chokes on .\ovpn-extract\ syntax
          $extract = Join-Path $PWD "ovpn-extract"
          New-Item -ItemType Directory -Force -Path $extract | Out-Null
          lessmsi x ovpn.msi "$extract\"
          # Find the extracted files (lessmsi may put them under SourceDir or directly)
          Get-ChildItem -Recurse $extract | Select-Object -First 30 FullName
          New-Item -ItemType Directory -Force -Path windows\openvpn | Out-Null
          $exe   = Get-ChildItem -Recurse $extract -Filter openvpn.exe | Select-Object -First 1
          $dll   = Get-ChildItem -Recurse $extract -Filter wintun.dll  | Select-Object -First 1
          $lic   = Get-ChildItem -Recurse $extract -Filter license.txt | Select-Object -First 1
          if (-not $exe) { Write-Error "openvpn.exe not found in extracted MSI"; exit 1 }
          Copy-Item $exe.FullName windows\openvpn\openvpn.exe
          if ($dll) { Copy-Item $dll.FullName windows\openvpn\wintun.dll }
          if ($lic) { Copy-Item $lic.FullName windows\openvpn\LICENSE-OpenVPN.txt }
          Get-ChildItem windows\openvpn\

      - name: Set up Python for PyInstaller
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build ZubriTunnel.exe (self-contained — no Python needed on user's machine)
        working-directory: windows
        run: |
          python -m pip install --upgrade pip pyinstaller
          pyinstaller --onefile --windowed --noconfirm --clean `
                      --icon icon.ico `
                      --name ZubriTunnel `
                      --add-data "icon.ico;." `
                      --add-data "icon.png;." `
                      --add-data "VERSION;." `
                      gui.py
          Move-Item -Force dist\ZubriTunnel.exe .\ZubriTunnel.exe
          # Cleanup PyInstaller intermediates so they don't go in the release
          Remove-Item -Recurse -Force build, dist, ZubriTunnel.spec -ErrorAction SilentlyContinue

      - name: Package Windows zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # Pack: ZubriTunnel.exe (GUI, no Python needed), vpn-proxy.exe (engine),
          # icon, install_shortcut.ps1, keys/example template, README, VERSION.
          # Skip gui.py / main.go / go.mod / Python source — end users don't need them.
          $files = @(
            'windows\ZubriTunnel.exe',
            'windows\vpn-proxy.exe',
            'windows\icon.ico',
            'windows\icon.png',
            'windows\install_shortcut.ps1',
            'windows\run.bat',
            'windows\run.ps1',
            'windows\keys',
            'windows\openvpn',
            'README.md',
            'VERSION'
          )
          Compress-Archive -Path $files -DestinationPath dist/ZubriTunnel-windows.zip -Force
          Get-ChildItem dist

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/ZubriTunnel-windows.zip

  build-mac:
    runs-on: macos-14    # Apple Silicon — its Xcode SDK is universal,
                         # so we can cross-compile to x86_64 with proper -arch flags
    env:
      PY_VERSION: "3.12.7"
      PY_BUILD: "20241016"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: mac/ZubriTunnel.app/Contents/Resources/go.sum

      - name: Sync gui.py from windows/ (single source of truth)
        run: |
          # CRITICAL: mac/ZubriTunnel.app/Contents/Resources/gui.py used to be a
          # divergent copy. Force it identical to windows/gui.py before every
          # build so changes can't drift between platforms.
          cp windows/gui.py mac/ZubriTunnel.app/Contents/Resources/gui.py
          shasum windows/gui.py mac/ZubriTunnel.app/Contents/Resources/gui.py

      - name: Stamp VERSION + Info.plist with tag
        run: |
          # Resolve TAG. github.ref_name is "v1.0.X" for tag pushes;
          # workflow_dispatch passes a manual `tag` input.
          TAG="${{ github.ref_name }}"
          [ -z "$TAG" ] && TAG="${{ github.event.inputs.tag }}"
          TAG="${TAG#v}"
          [ -z "$TAG" ] && TAG="dev"
          # Write VERSION via printf (no trailing newline issues)
          printf '%s' "$TAG" > VERSION
          printf '%s' "$TAG" > mac/ZubriTunnel.app/Contents/Resources/VERSION
          ls -la VERSION mac/ZubriTunnel.app/Contents/Resources/VERSION
          cat VERSION
          # Bump version EVERYWHERE macOS shows it:
          #   - CFBundleShortVersionString → Get Info / About
          #   - CFBundleVersion            → internal build version
          #   - CFBundleDisplayName        → name in Dock + menu bar (top of screen)
          #   - CFBundleName               → name in app switcher (Cmd+Tab)
          PLIST=mac/ZubriTunnel.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $TAG" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $TAG" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName ZubriTunnel v$TAG" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName ZubriTunnel v$TAG" "$PLIST"
          echo "stamped version: $TAG"
          cat "$PLIST"

      - name: Build universal vpn-proxy (arm64 native + x86_64 cross with CGO)
        run: |
          RES="mac/ZubriTunnel.app/Contents/Resources"
          MACOS="mac/ZubriTunnel.app/Contents/MacOS"

          # arm64 native — straightforward
          (cd "$RES" && go build -o /tmp/vpn-proxy-arm64 .)
          file /tmp/vpn-proxy-arm64

          # x86_64 cross — clang on Apple Silicon supports -arch x86_64 via the
          # universal SDK (CommandLineTools include both x86_64 and arm64 stubs).
          (cd "$RES" && \
            CGO_ENABLED=1 GOARCH=amd64 GOOS=darwin \
            CC="clang -arch x86_64" CXX="clang++ -arch x86_64" \
            go build -o /tmp/vpn-proxy-x86_64 .)
          file /tmp/vpn-proxy-x86_64

          # Merge into universal binary
          lipo -create /tmp/vpn-proxy-arm64 /tmp/vpn-proxy-x86_64 -output "$MACOS/vpn-proxy"
          chmod +x "$MACOS/vpn-proxy"
          file "$MACOS/vpn-proxy"

      - name: Bundle OpenVPN binary (universal arm64+x86_64) from Tunnelblick
        run: |
          # Tunnelblick bundles pre-compiled universal openvpn binaries, Apple-signed
          # by jkbullard. Extract one into our .app's Frameworks/.
          curl -fL -o tb.dmg "https://tunnelblick.net/iprelease/Tunnelblick_8.0.1_build_6301.dmg"
          ls -la tb.dmg
          file tb.dmg
          hdiutil attach tb.dmg -mountpoint /Volumes/TB -nobrowse -quiet
          ls /Volumes/TB
          # Tunnelblick mounts as 'Tunnelblick' or 'Tunnelblick X.Y'
          TB_APP="$(find /Volumes/TB -maxdepth 2 -name 'Tunnelblick.app' -type d | head -1)"
          if [ -z "$TB_APP" ]; then
            echo "Tunnelblick.app not found on mounted DMG"
            ls -R /Volumes/TB || true
            exit 1
          fi
          OVPN="$(find "$TB_APP/Contents/Resources/openvpn" -name openvpn -type f 2>/dev/null | sort -V | tail -1)"
          if [ -z "$OVPN" ]; then
            echo "openvpn binary not found inside Tunnelblick.app"
            ls -R "$TB_APP/Contents/Resources/openvpn" || true
            exit 1
          fi
          echo "found openvpn at: $OVPN"
          FW="mac/ZubriTunnel.app/Contents/Frameworks"
          mkdir -p "$FW"
          cp "$OVPN" "$FW/openvpn"
          chmod +x "$FW/openvpn"
          file "$FW/openvpn"
          hdiutil detach /Volumes/TB -quiet || true
          codesign --force --options runtime --sign - "$FW/openvpn" || true

      - name: Bundle standalone Python (arm64 + x86_64)
        run: |
          BASE="https://github.com/astral-sh/python-build-standalone/releases/download/${PY_BUILD}"
          FW="mac/ZubriTunnel.app/Contents/Frameworks"
          mkdir -p "$FW"
          for arch in aarch64 x86_64; do
            URL="${BASE}/cpython-${PY_VERSION}+${PY_BUILD}-${arch}-apple-darwin-install_only.tar.gz"
            echo "downloading $URL"
            curl -fL "$URL" -o /tmp/py.tar.gz
            mkdir -p "/tmp/py-${arch}"
            tar -xzf /tmp/py.tar.gz -C "/tmp/py-${arch}"
            outname="Python-arm64"
            [ "$arch" = "x86_64" ] && outname="Python-x86_64"
            mv "/tmp/py-${arch}/python" "$FW/$outname"
            chmod +x "$FW/$outname/bin/python3"
            rm -f /tmp/py.tar.gz
          done
          ls -la "$FW"

      - name: Make scripts executable
        run: |
          chmod +x mac/run.sh mac/gui.command
          chmod +x "mac/ZubriTunnel.app/Contents/MacOS/launcher"

      - name: Ad-hoc codesign all binaries (helps Gatekeeper, no Apple ID needed)
        run: |
          APP="mac/ZubriTunnel.app"
          # Sign nested binaries first (deep)
          find "$APP/Contents/Frameworks" -type f \( -name "*.dylib" -o -perm +111 \) 2>/dev/null \
            | while read f; do codesign --force --sign - "$f" 2>/dev/null || true; done
          codesign --force --sign - "$APP/Contents/MacOS/vpn-proxy" 2>/dev/null || true
          codesign --force --sign - "$APP/Contents/MacOS/launcher" 2>/dev/null || true
          # Sign the app bundle as a whole
          codesign --force --deep --sign - "$APP" 2>/dev/null || true
          codesign --verify --deep "$APP" 2>&1 | head -5 || true

      - name: Package Mac tar.gz (preserves +x bits + Python runtimes)
        run: |
          mkdir -p dist
          tar -czf dist/ZubriTunnel-mac.tar.gz \
            mac README.md VERSION install.sh
          ls -lh dist/

      - name: Build macOS .pkg installer with postinstall fix-up
        run: |
          mkdir -p dist
          # postinstall script restores executable bits, re-signs ad-hoc, and
          # strips the install quarantine that some macOS versions add even
          # to apps placed by Apple's installer.
          mkdir -p scripts
          cat > scripts/postinstall <<'EOF'
          #!/bin/bash
          APP="/Applications/ZubriTunnel.app"
          # Restore executable bits (pkgbuild's --ownership recommended sometimes wipes them)
          chmod 755 "$APP/Contents/MacOS/launcher" 2>/dev/null
          chmod 755 "$APP/Contents/MacOS/vpn-proxy" 2>/dev/null
          chmod 755 "$APP/Contents/Resources/install_deps.sh" 2>/dev/null
          for arch in arm64 x86_64; do
            for f in "$APP/Contents/Frameworks/Python-$arch/bin/"*; do
              [ -f "$f" ] && chmod 755 "$f" 2>/dev/null
            done
          done
          # Re-sign the bundle ad-hoc (pkgbuild's payload extraction strips the
          # original signature on some macOS versions)
          /usr/bin/codesign --force --deep --sign - "$APP" 2>/dev/null || true
          # Strip quarantine so Gatekeeper doesn't block the freshly-installed app
          /usr/bin/xattr -dr com.apple.quarantine "$APP" 2>/dev/null || true
          exit 0
          EOF
          chmod +x scripts/postinstall

          pkgbuild --root mac/ZubriTunnel.app \
                   --identifier local.zubritunnel \
                   --version "${GITHUB_REF#refs/tags/v}" \
                   --install-location "/Applications/ZubriTunnel.app" \
                   --ownership preserve \
                   --scripts scripts \
                   dist/ZubriTunnel.pkg
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            dist/ZubriTunnel-mac.tar.gz
            dist/ZubriTunnel.pkg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: mac
          path: dist

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ZubriTunnel ${{ steps.tag.outputs.tag }}
          body: |
            ZubriTunnel ${{ steps.tag.outputs.tag }} — точечный VPN для приложений.

            ## 🍎 macOS — выбери удобный способ:

            **Самый простой — `.pkg` installer:**
            1. Скачай `ZubriTunnel.pkg` ниже
            2. Двойной клик → пройди стандартный installer wizard → готово
            3. ZubriTunnel появится в `/Applications/`, открывай через Spotlight (`Cmd+Space → Zubritunnel`)

            **Одна команда (для тех кто дружит с Terminal):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/AntonZubritski/ZubriTunnel/main/install.sh | bash
            ```

            **Ручной способ (`tar.gz`):** распакуй, в папке `mac/` запусти:
            ```bash
            xattr -dr com.apple.quarantine ZubriTunnel.app
            open ZubriTunnel.app
            ```

            ## 🪟 Windows

            Скачай `ZubriTunnel-windows.zip`, распакуй, запусти `install_shortcut.ps1` через PowerShell. Ярлык появится на рабочем столе.

            ---

            Полная инструкция: [README](https://github.com/AntonZubritski/ZubriTunnel/blob/main/README.md)
          files: |
            dist/ZubriTunnel-windows.zip
            dist/ZubriTunnel-mac.tar.gz
            dist/ZubriTunnel.pkg
          generate_release_notes: true
