name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: windows/go.sum

      - name: Install rsrc (icon embedder)
        run: go install github.com/akavel/rsrc@latest

      - name: Embed icon and build vpn-proxy.exe
        working-directory: windows
        run: |
          $env:Path += ';' + (go env GOPATH) + '\bin'
          rsrc -ico icon.ico -manifest "" -o rsrc_windows.syso
          go build -o vpn-proxy.exe .

      - name: Package Windows zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path windows/*, README.md, VERSION `
                           -DestinationPath dist/ZubriTunnel-windows.zip
          Get-ChildItem dist

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/ZubriTunnel-windows.zip

  build-mac:
    runs-on: macos-14    # Apple Silicon — its Xcode SDK is universal,
                         # so we can cross-compile to x86_64 with proper -arch flags
    env:
      PY_VERSION: "3.12.7"
      PY_BUILD: "20241016"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: mac/ZubriTunnel.app/Contents/Resources/go.sum

      - name: Build universal vpn-proxy (arm64 native + x86_64 cross with CGO)
        run: |
          RES="mac/ZubriTunnel.app/Contents/Resources"
          MACOS="mac/ZubriTunnel.app/Contents/MacOS"

          # arm64 native — straightforward
          (cd "$RES" && go build -o /tmp/vpn-proxy-arm64 .)
          file /tmp/vpn-proxy-arm64

          # x86_64 cross — clang on Apple Silicon supports -arch x86_64 via the
          # universal SDK (CommandLineTools include both x86_64 and arm64 stubs).
          (cd "$RES" && \
            CGO_ENABLED=1 GOARCH=amd64 GOOS=darwin \
            CC="clang -arch x86_64" CXX="clang++ -arch x86_64" \
            go build -o /tmp/vpn-proxy-x86_64 .)
          file /tmp/vpn-proxy-x86_64

          # Merge into universal binary
          lipo -create /tmp/vpn-proxy-arm64 /tmp/vpn-proxy-x86_64 -output "$MACOS/vpn-proxy"
          chmod +x "$MACOS/vpn-proxy"
          file "$MACOS/vpn-proxy"

      - name: Bundle standalone Python (arm64 + x86_64)
        run: |
          BASE="https://github.com/astral-sh/python-build-standalone/releases/download/${PY_BUILD}"
          FW="mac/ZubriTunnel.app/Contents/Frameworks"
          mkdir -p "$FW"
          for arch in aarch64 x86_64; do
            URL="${BASE}/cpython-${PY_VERSION}+${PY_BUILD}-${arch}-apple-darwin-install_only.tar.gz"
            echo "downloading $URL"
            curl -fL "$URL" -o /tmp/py.tar.gz
            mkdir -p "/tmp/py-${arch}"
            tar -xzf /tmp/py.tar.gz -C "/tmp/py-${arch}"
            outname="Python-arm64"
            [ "$arch" = "x86_64" ] && outname="Python-x86_64"
            mv "/tmp/py-${arch}/python" "$FW/$outname"
            chmod +x "$FW/$outname/bin/python3"
            rm -f /tmp/py.tar.gz
          done
          ls -la "$FW"

      - name: Make scripts executable
        run: |
          chmod +x mac/run.sh mac/gui.command
          chmod +x "mac/ZubriTunnel.app/Contents/MacOS/launcher"

      - name: Ad-hoc codesign all binaries (helps Gatekeeper, no Apple ID needed)
        run: |
          APP="mac/ZubriTunnel.app"
          # Sign nested binaries first (deep)
          find "$APP/Contents/Frameworks" -type f \( -name "*.dylib" -o -perm +111 \) 2>/dev/null \
            | while read f; do codesign --force --sign - "$f" 2>/dev/null || true; done
          codesign --force --sign - "$APP/Contents/MacOS/vpn-proxy" 2>/dev/null || true
          codesign --force --sign - "$APP/Contents/MacOS/launcher" 2>/dev/null || true
          # Sign the app bundle as a whole
          codesign --force --deep --sign - "$APP" 2>/dev/null || true
          codesign --verify --deep "$APP" 2>&1 | head -5 || true

      - name: Package Mac tar.gz (preserves +x bits + Python runtimes)
        run: |
          mkdir -p dist
          tar -czf dist/ZubriTunnel-mac.tar.gz \
            mac README.md VERSION install.sh
          ls -lh dist/

      - name: Build macOS .pkg installer with postinstall fix-up
        run: |
          mkdir -p dist
          # postinstall script restores executable bits, re-signs ad-hoc, and
          # strips the install quarantine that some macOS versions add even
          # to apps placed by Apple's installer.
          mkdir -p scripts
          cat > scripts/postinstall <<'EOF'
          #!/bin/bash
          APP="/Applications/ZubriTunnel.app"
          # Restore executable bits (pkgbuild's --ownership recommended sometimes wipes them)
          chmod 755 "$APP/Contents/MacOS/launcher" 2>/dev/null
          chmod 755 "$APP/Contents/MacOS/vpn-proxy" 2>/dev/null
          chmod 755 "$APP/Contents/Resources/install_deps.sh" 2>/dev/null
          for arch in arm64 x86_64; do
            for f in "$APP/Contents/Frameworks/Python-$arch/bin/"*; do
              [ -f "$f" ] && chmod 755 "$f" 2>/dev/null
            done
          done
          # Re-sign the bundle ad-hoc (pkgbuild's payload extraction strips the
          # original signature on some macOS versions)
          /usr/bin/codesign --force --deep --sign - "$APP" 2>/dev/null || true
          # Strip quarantine so Gatekeeper doesn't block the freshly-installed app
          /usr/bin/xattr -dr com.apple.quarantine "$APP" 2>/dev/null || true
          exit 0
          EOF
          chmod +x scripts/postinstall

          pkgbuild --root mac/ZubriTunnel.app \
                   --identifier local.zubritunnel \
                   --version "${GITHUB_REF#refs/tags/v}" \
                   --install-location "/Applications/ZubriTunnel.app" \
                   --ownership preserve \
                   --scripts scripts \
                   dist/ZubriTunnel.pkg
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            dist/ZubriTunnel-mac.tar.gz
            dist/ZubriTunnel.pkg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: mac
          path: dist

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ZubriTunnel ${{ steps.tag.outputs.tag }}
          body: |
            ZubriTunnel ${{ steps.tag.outputs.tag }} — точечный VPN для приложений.

            ## 🍎 macOS — выбери удобный способ:

            **Самый простой — `.pkg` installer:**
            1. Скачай `ZubriTunnel.pkg` ниже
            2. Двойной клик → пройди стандартный installer wizard → готово
            3. ZubriTunnel появится в `/Applications/`, открывай через Spotlight (`Cmd+Space → Zubritunnel`)

            **Одна команда (для тех кто дружит с Terminal):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/AntonZubritski/ZubriTunnel/main/install.sh | bash
            ```

            **Ручной способ (`tar.gz`):** распакуй, в папке `mac/` запусти:
            ```bash
            xattr -dr com.apple.quarantine ZubriTunnel.app
            open ZubriTunnel.app
            ```

            ## 🪟 Windows

            Скачай `ZubriTunnel-windows.zip`, распакуй, запусти `install_shortcut.ps1` через PowerShell. Ярлык появится на рабочем столе.

            ---

            Полная инструкция: [README](https://github.com/AntonZubritski/ZubriTunnel/blob/main/README.md)
          files: |
            dist/ZubriTunnel-windows.zip
            dist/ZubriTunnel-mac.tar.gz
            dist/ZubriTunnel.pkg
          generate_release_notes: true
