name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: windows/go.sum

      - name: Install rsrc (icon embedder)
        run: go install github.com/akavel/rsrc@latest

      - name: Embed icon and build vpn-proxy.exe
        working-directory: windows
        run: |
          $env:Path += ';' + (go env GOPATH) + '\bin'
          rsrc -ico icon.ico -manifest "" -o rsrc_windows.syso
          go build -o vpn-proxy.exe .

      - name: Package Windows zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path windows/*, README.md, VERSION `
                           -DestinationPath dist/ZubriTunnel-windows.zip
          Get-ChildItem dist

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/ZubriTunnel-windows.zip

  # Build vpn-proxy NATIVELY on each macOS arch — avoids fragile cross-compilation
  # of outline-sdk + x/mobile. Each runner produces a single-arch binary;
  # the merge job below combines them with `lipo` and bundles Python runtimes.
  build-mac-bin:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14    # Apple Silicon
            go-arch: arm64
          - arch: x86_64
            runner: macos-13    # Intel
            go-arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: mac/ZubriTunnel.app/Contents/Resources/go.sum
      - name: Build vpn-proxy (${{ matrix.arch }})
        working-directory: mac/ZubriTunnel.app/Contents/Resources
        run: go build -o /tmp/vpn-proxy-${{ matrix.arch }} .
      - name: Inspect binary
        run: file /tmp/vpn-proxy-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: vpn-proxy-${{ matrix.arch }}
          path: /tmp/vpn-proxy-${{ matrix.arch }}

  build-mac:
    needs: build-mac-bin
    runs-on: macos-14
    env:
      PY_VERSION: "3.12.7"
      PY_BUILD: "20241016"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: vpn-proxy-arm64
          path: /tmp/bin-arm64
      - uses: actions/download-artifact@v4
        with:
          name: vpn-proxy-x86_64
          path: /tmp/bin-x86_64

      - name: Combine into universal vpn-proxy
        run: |
          MACOS="mac/ZubriTunnel.app/Contents/MacOS"
          chmod +x /tmp/bin-arm64/vpn-proxy-arm64 /tmp/bin-x86_64/vpn-proxy-x86_64
          lipo -create \
            /tmp/bin-arm64/vpn-proxy-arm64 \
            /tmp/bin-x86_64/vpn-proxy-x86_64 \
            -output "$MACOS/vpn-proxy"
          chmod +x "$MACOS/vpn-proxy"
          file "$MACOS/vpn-proxy"

      - name: Bundle standalone Python (arm64 + x86_64)
        run: |
          BASE="https://github.com/astral-sh/python-build-standalone/releases/download/${PY_BUILD}"
          FW="mac/ZubriTunnel.app/Contents/Frameworks"
          mkdir -p "$FW"
          for arch in aarch64 x86_64; do
            URL="${BASE}/cpython-${PY_VERSION}+${PY_BUILD}-${arch}-apple-darwin-install_only.tar.gz"
            echo "downloading $URL"
            curl -fL "$URL" -o /tmp/py.tar.gz
            mkdir -p "/tmp/py-${arch}"
            tar -xzf /tmp/py.tar.gz -C "/tmp/py-${arch}"
            outname="Python-arm64"
            [ "$arch" = "x86_64" ] && outname="Python-x86_64"
            mv "/tmp/py-${arch}/python" "$FW/$outname"
            chmod +x "$FW/$outname/bin/python3"
            rm -f /tmp/py.tar.gz
          done
          ls -la "$FW"

      - name: Make scripts executable
        run: |
          chmod +x mac/run.sh mac/gui.command
          chmod +x "mac/ZubriTunnel.app/Contents/MacOS/launcher"

      - name: Package Mac tar.gz (preserves +x bits + Python runtimes)
        run: |
          mkdir -p dist
          tar -czf dist/ZubriTunnel-mac.tar.gz \
            mac README.md VERSION
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: dist/ZubriTunnel-mac.tar.gz

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: mac
          path: dist

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ZubriTunnel ${{ steps.tag.outputs.tag }}
          body: |
            ZubriTunnel ${{ steps.tag.outputs.tag }} — точечный VPN для приложений.

            **Скачать:**
            - **Windows:** `ZubriTunnel-windows.zip` — распакуй, запусти `install_shortcut.ps1` через PowerShell, дальше двойной клик по ярлыку «ZubriTunnel» на рабочем столе.
            - **macOS:** `ZubriTunnel-mac.tar.gz` — распакуй, в папке `mac/` двойной клик по `ZubriTunnel.app`.

            Полная инструкция в README.
          files: |
            dist/ZubriTunnel-windows.zip
            dist/ZubriTunnel-mac.tar.gz
          generate_release_notes: true
